<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trợ Lý Phòng Chống Lừa Đảo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- TÍCH HỢP THƯ VIỆN ĐỌC GIỌNG NÓI ĐÁM MÂY (MIỄN PHÍ PHI THƯƠNG MẠI) -->
    <script src="https://code.responsivevoice.org/responsivevoice.js?key=951N2T1Z"></script>

    <style>
        :root {
            --primary: #1557c9;
            --primary-hover: #1045a0;
            --primary-light: #dbe8ff;
            --primary-gradient: linear-gradient(135deg, #1557c9 0%, #0d3a8a 100%);
            --bg-color: #eef1f5;
            --sidebar-bg: #ffffff;
            --chat-bg: #ffffff;
            --text-main: #111827;
            --text-secondary: #1f2937;
            --text-muted: #6b7280;
            --border-color: #cbd5e1;
            --danger: #dc2626;
            --success: #16a34a;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.08);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.12);
            --sidebar-width: 300px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); display: flex; height: 100dvh; overflow: hidden; }
        body, input, button, textarea { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .app-container { display: flex; width: 100%; height: 100dvh; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            border-right: 2px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .sidebar .close-sidebar {
            display: none;
            background: transparent; border: none;
            color: var(--text-muted); cursor: pointer;
            font-size: 22px; padding: 8px; align-self: flex-end;
            min-width: 44px; min-height: 44px;
            align-items: center; justify-content: center;
        }
        .sidebar .close-sidebar:hover { color: var(--text-main); background: var(--bg-color); border-radius: 8px; }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 8px 4px 16px;
            border-bottom: 2px solid var(--border-color);
        }
        .brand-icon {
            width: 48px; height: 48px;
            background: var(--primary-gradient);
            border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
            flex-shrink: 0;
        }
        .brand-text h2 { font-size: 17px; font-weight: 700; color: var(--text-main); line-height: 1.3; }
        .brand-text span { font-size: 13px; color: var(--text-muted); font-weight: 500; }

        .new-chat-btn {
            margin: 16px 0;
            background: var(--primary-gradient);
            color: white;
            border: none;
            min-height: 48px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .new-chat-btn:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .new-chat-btn:active { transform: translateY(0); }

        .history-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .history-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 4px 10px;
        }
        .history-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 12px;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
            border: 1px solid transparent;
            transition: all 0.15s;
            min-height: 48px;
        }
        .history-item:hover { background: var(--primary-light); border-color: var(--primary); }
        .history-item.active {
            background: var(--primary-light);
            border-color: var(--primary);
            border-width: 2px;
        }
        .chat-title-text {
            font-size: 15px;
            color: var(--text-main);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .delete-btn {
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 8px;
            opacity: 0;
            transition: all 0.15s;
            min-width: 40px; min-height: 40px;
        }
        .history-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { color: var(--danger); background: #fef2f2; }

        .export-section { margin-top: auto; padding-top: 14px; border-top: 2px solid var(--border-color); }
        .export-btn {
            background: transparent; color: var(--text-secondary); border: 2px solid var(--border-color);
            padding: 12px; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 600;
            display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; transition: all 0.2s;
            min-height: 48px;
        }
        .export-btn:hover { background: #f1f5f9; color: var(--text-main); border-color: var(--text-muted); }

        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-color); min-width: 0; }
        .chat-header {
            background: var(--chat-bg); padding: 14px 24px;
            border-bottom: 2px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between;
            gap: 12px;
        }
        .hamburger-btn {
            display: none; background: transparent; border: none;
            color: var(--text-secondary); cursor: pointer;
            width: 48px; height: 48px; border-radius: 10px;
            align-items: center; justify-content: center;
            flex-shrink: 0; transition: background 0.15s; font-size: 20px;
        }
        .hamburger-btn:hover { background: var(--bg-color); }

        .sidebar-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 90;
            background: rgba(0,0,0,0.5);
            opacity: 0; transition: opacity 0.2s;
        }
        .sidebar-overlay.open { display: block; opacity: 1; }

        .chat-header-title {
            display: flex; align-items: center; gap: 12px;
            font-weight: 700; color: var(--text-main); font-size: 17px;
            flex: 1; min-width: 0;
        }
        .chat-header-title i { font-size: 22px; }
        .chat-header-title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--success); font-weight: 500; flex-shrink: 0; }
        .status-dot { width: 10px; height: 10px; background-color: var(--success); border-radius: 50%; }
        .new-chat-header-btn {
            display: flex; align-items: center; justify-content: center;
            color: var(--success); flex-shrink: 0;
            background: transparent; border: none; cursor: pointer;
            padding: 10px 14px; border-radius: 10px; transition: all 0.2s;
            min-width: 48px; min-height: 48px;
        }
        .new-chat-header-btn:hover { background: var(--bg-color); color: #15803d; }
        .new-chat-header-btn i { font-size: 22px; }

        .chat-container {
            flex: 1; padding: 24px 28px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 16px;
            overscroll-behavior: contain;
        }

        .message {
            max-width: 78%; padding: 16px 20px;
            border-radius: 16px; font-size: 18px; line-height: 1.6;
            word-wrap: break-word; animation: msgIn 0.2s ease-out;
        }
        .user-message {
            background: var(--primary-gradient); color: white;
            align-self: flex-end; border-bottom-right-radius: 6px;
        }
        .bot-message {
            background: var(--chat-bg); color: var(--text-main);
            align-self: flex-start; border-bottom-left-radius: 6px;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border-color);
        }
        .error-message {
            background: #fef2f2; color: #991b1b;
            align-self: flex-start; border: 2px solid #fecaca;
            font-weight: 500;
        }

        @keyframes msgIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .typing-indicator {
            display: flex; gap: 6px; padding: 10px 6px;
        }
        .typing-indicator span {
            width: 10px; height: 10px; background: var(--text-muted);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        .suggested-prompts {
            display: flex; flex-wrap: wrap; gap: 10px;
            padding: 6px 0 10px; justify-content: center;
        }
        .prompt-chip {
            background: white; color: var(--text-secondary);
            border: 2px solid var(--border-color);
            padding: 12px 20px; border-radius: 24px;
            cursor: pointer; font-size: 16px; font-weight: 600;
            transition: all 0.2s; box-shadow: var(--shadow-sm);
            min-height: 48px;
        }
        .prompt-chip:hover {
            background: var(--primary-light); color: var(--primary);
            border-color: var(--primary); transform: translateY(-1px);
        }

        .msg-time {
            font-size: 12px; color: var(--text-muted);
            margin-top: 6px; text-align: right; font-weight: 500;
        }
        .bot-message .msg-time { text-align: left; }

        .input-container {
            background: var(--chat-bg); padding: 18px 24px 22px;
            border-top: 2px solid var(--border-color);
            padding-bottom: calc(22px + env(safe-area-inset-bottom, 0px));
        }
        .input-box-wrapper {
            display: flex; background: var(--bg-color);
            border-radius: 40px; padding: 6px 6px 6px 22px;
            align-items: center; gap: 10px;
            border: 2px solid transparent;
            transition: border-color 0.2s;
            box-shadow: var(--shadow-sm);
        }
        .input-box-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(21,87,201,0.15);
        }
        .input-box-wrapper input {
            flex: 1; border: none; background: transparent;
            outline: none; font-size: 18px; color: var(--text-main);
            padding: 6px 0;
        }
        .input-box-wrapper input::placeholder { color: var(--text-muted); font-weight: 400; }
        
        .mic-btn {
            background: transparent; color: var(--text-secondary);
            border: none; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.2s;
            flex-shrink: 0; font-size: 18px;
        }
        .mic-btn:hover { background: #e2e8f0; color: var(--text-main); }
        .mic-btn.recording { background: var(--danger); color: white; animation: pulse 1.5s infinite; }
        
        .send-btn {
            background: var(--primary-gradient); color: white;
            border: none; width: 48px; height: 48px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: all 0.15s;
            flex-shrink: 0; font-size: 18px;
        }
        .send-btn:hover { opacity: 0.9; transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1.0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                z-index: 100;
                transform: translateX(-100%);
                transition: transform 0.25s ease;
                box-shadow: 4px 0 24px rgba(0,0,0,0.15);
            }
            .sidebar.open { transform: translateX(0); }

            .sidebar .close-sidebar { display: flex; }

            .hamburger-btn { display: flex; }

            .status-indicator { display: none; }

            .chat-header { padding: 10px 12px; }
            .chat-header-title { font-size: 16px; gap: 10px; }

            .chat-container { padding: 16px 14px; gap: 14px; }

            .message { max-width: 92%; font-size: 17px; padding: 14px 16px; }

            .input-container { padding: 12px 14px; padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px)); }
            .input-box-wrapper { padding: 4px 4px 4px 16px; }
            .input-box-wrapper input { font-size: 17px; }

            .suggested-prompts { gap: 8px; }
            .prompt-chip { font-size: 15px; padding: 10px 16px; min-height: 44px; }

            .brand-text h2 { font-size: 16px; }
        }

        @media (min-width: 769px) {
            .hamburger-btn { display: none !important; }
            .sidebar-overlay { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
        <div class="sidebar" id="sidebar">
            <button class="close-sidebar" onclick="closeSidebar()"><i class="fa-solid fa-xmark"></i></button>
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="brand-text">
                    <h2>Trợ Lý Phòng Chống Lừa Đảo</h2>
                    <span>An toàn & Bảo mật</span>
                </div>
            </div>
            
            <button class="new-chat-btn" onclick="createNewChat()">
                <i class="fa-solid fa-plus"></i> Cuộc trò chuyện mới
            </button>

            <div class="history-container">
                <div class="history-title">Lịch sử trò chuyện</div>
                <div id="historyList" style="display: flex; flex-direction: column; gap: 8px;"></div>
            </div>

            <div class="export-section">
                <button class="export-btn" onclick="exportChatLog()">
                    <i class="fa-solid fa-download"></i> Tải về lịch sử trò chuyện
                </button>
            </div>
        </div>

        <div class="chat-area">
            <div class="chat-header">
                <button class="hamburger-btn" onclick="toggleSidebar()" aria-label="Menu">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="chat-header-title">
                    <i class="fa-solid fa-shield-halved" style="color: var(--primary);"></i>
                    <span>Trợ Lý Phòng Chống Lừa Đảo</span>
                </div>
                <div class="status-indicator"><div class="status-dot"></div>Kết nối an toàn</div>
                <button class="new-chat-header-btn" onclick="createNewChat()" title="Cuộc trò chuyện mới">
                    <i class="fa-solid fa-plus-circle"></i>
                </button>
            </div>

            <div class="chat-container" id="chatContainer"></div>

            <div class="input-container">
                <div class="input-box-wrapper">
                    <input type="text" id="userInput" placeholder="Nhập câu hỏi hoặc bấm mic để nói..." onkeypress="handleKeyPress(event)">
                    
                    <button class="mic-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Bấm để nói">
                        <i class="fa-solid fa-microphone"></i>
                    </button>
                    
                    <button class="send-btn" onclick="sendMessage()">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const historyList = document.getElementById('historyList');
        const micBtn = document.getElementById('micBtn');

        // ----------------------------------------------------
        // HÀM ĐỌC GIỌNG NÓI ĐÃ ĐƯỢC CHUYỂN SANG THƯ VIỆN ĐÁM MÂY
        // ----------------------------------------------------
        function speak(text) {
            if (typeof responsiveVoice !== 'undefined') {
                // Ngắt các âm thanh cũ trước khi phát âm thanh mới
                responsiveVoice.cancel();
                
                // Phát bằng giọng tiếng Việt Nam chuẩn (Nam/Nữ tùy cấu hình)
                // Bạn có thể chọn "Vietnamese Male" hoặc "Vietnamese Female"
                responsiveVoice.speak(text, "Vietnamese Male", {
                    rate: 0.95,  // Tốc độ nói hơi chậm một chút để ông bà nghe rõ
                    pitch: 1.0  // Cao độ giọng nói tự nhiên
                });
            } else {
                console.error("Chưa tải được thư viện ResponsiveVoice đám mây.");
            }
        }

        // ----------------------------------------------------
        // CẤU HÌNH NHẬN DIỆN GIỌNG NÓI (SPEECH RECOGNITION)
        // ----------------------------------------------------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let isRecording = false;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'vi-VN';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                userInput.placeholder = "Đang nghe ông bà nói...";
            };

            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                userInput.placeholder = "Nhập câu hỏi hoặc bấm mic để nói...";
            };

            recognition.onresult = (event) => {
                const textResult = event.results[0][0].transcript;
                userInput.value = textResult;
                sendMessage();
            };

            recognition.onerror = (event) => {
                console.error("Lỗi nhận diện:", event.error);
                if (event.error !== 'no-speech') {
                    let errMsg = "Dạ cháu chưa nghe rõ, ông bà bấm lại micro để nói nhé ạ!";
                    appendMessageElement(errMsg, 'error-message', 'err-mic-' + Date.now());
                    speak(errMsg);
                }
            };
        } else {
            micBtn.style.display = 'none';
        }

        function toggleSpeechRecognition() {
            if (!recognition) return;
            if (isRecording) {
                recognition.stop();
            } else {
                if (typeof responsiveVoice !== 'undefined') responsiveVoice.cancel();
                recognition.start();
            }
        }

        // ----------------------------------------------------
        // QUẢN LÝ LOGIC APP & LỊCH SỬ CHAT
        // ----------------------------------------------------
        let allChats = JSON.parse(localStorage.getItem('allChats')) || [];
        let currentChatId = localStorage.getItem('currentChatId') || null;

        if (allChats.length === 0) {
            createNewChat();
        } else {
            if (!currentChatId || !allChats.find(c => c.id === currentChatId)) {
                currentChatId = allChats[0].id;
            }
            renderHistoryList();
            renderMessages();
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                sendMessage();
            }
        }

        function createNewChat() {
            const newId = 'chat-' + Date.now();
            const newChat = {
                id: newId,
                title: 'Cuộc trò chuyện mới',
                messages: []
            };
            allChats.unshift(newChat);
            currentChatId = newId;
            saveAndRefresh();
        }

        function switchChat(id) {
            closeSidebar();
            currentChatId = id;
            localStorage.setItem('currentChatId', currentChatId);
            renderHistoryList();
            renderMessages();
            
            const activeChat = allChats.find(c => c.id === currentChatId);
            if (activeChat && activeChat.messages.length === 0) {
                showSuggestedPrompts();
                speak('Dạ cháu chào ông bà ạ! Hôm nay có ai gọi điện lạ hoặc nhắn tin đáng nghi cho ông bà không? Ông bà kể cho cháu nghe nhé!');
            } else {
                hideSuggestedPrompts();
            }
        }

        function deleteChat(id, event) {
            event.stopPropagation();
            allChats = allChats.filter(c => c.id !== id);
            
            if (currentChatId === id) {
                currentChatId = allChats.length > 0 ? allChats[0].id : null;
            }
            if (allChats.length === 0) {
                createNewChat();
            } else {
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('allChats', JSON.stringify(allChats));
            localStorage.setItem('currentChatId', currentChatId);
            renderHistoryList();
            renderMessages();
        }

        function renderHistoryList() {
            historyList.innerHTML = '';
            allChats.forEach(chat => {
                const item = document.createElement('div');
                item.className = `history-item ${chat.id === currentChatId ? 'active' : ''}`;
                item.onclick = () => switchChat(chat.id);

                item.innerHTML = `
                    <div class="chat-title-text">
                        <i class="fa-regular fa-message" style="margin-right: 8px; color: #4a5568;"></i>
                        <span>${chat.title}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteChat('${chat.id}', event)">
                        <i class="fa-regular fa-trash-can"></i>
                    </button>
                `;
                historyList.appendChild(item);
            });
        }

        function renderMessages() {
            chatContainer.innerHTML = '';
            const activeChat = allChats.find(c => c.id === currentChatId);
            if (!activeChat) return;

            if (activeChat.messages.length === 0) {
                appendMessageElement('Dạ cháu chào ông bà ạ! Hôm nay có ai gọi điện lạ hoặc nhắn tin đáng nghi cho ông bà không? Ông bà kể cho cháu nghe nhé!', 'bot-message', 'welcome');
                showSuggestedPrompts();
                return;
            }

            activeChat.messages.forEach((msg, index) => {
                const className = msg.role === 'user' ? 'user-message' : 'bot-message';
                appendMessageElement(msg.content, className, 'msg-' + index);
            });
        }

        function showSuggestedPrompts() {
            hideSuggestedPrompts();
            const chips = [
                'Có số lạ gọi cho tôi',
                'Nhận được tin nhắn nghi ngờ',
                'Có người yêu cầu chuyển tiền',
                'Thấy quảng cáo đầu tư trên mạng'
            ];
            const div = document.createElement('div');
            div.id = 'suggestedPrompts';
            div.className = 'suggested-prompts';
            chips.forEach(text => {
                const chip = document.createElement('button');
                chip.className = 'prompt-chip';
                chip.textContent = text;
                chip.onclick = () => usePrompt(text);
                div.appendChild(chip);
            });
            chatContainer.appendChild(div);
        }

        function hideSuggestedPrompts() {
            const existing = document.getElementById('suggestedPrompts');
            if (existing) existing.remove();
        }

        function usePrompt(text) {
            userInput.value = text;
            hideSuggestedPrompts();
            sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const activeChat = allChats.find(c => c.id === currentChatId);
            if (!activeChat) return;

            if (activeChat.messages.length === 0) {
                activeChat.title = text.length > 18 ? text.substring(0, 18) + '...' : text;
                renderHistoryList();
            }

            hideSuggestedPrompts();
            appendMessageElement(text, 'user-message', 'user-' + Date.now());
            activeChat.messages.push({ role: "user", content: text });
            userInput.value = '';
            localStorage.setItem('allChats', JSON.stringify(allChats));

            const loadingId = 'loading-' + Date.now();
            const typingHtml = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            appendMessageElement(typingHtml, 'bot-message', loadingId, true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: activeChat.messages })
                });

                const data = await response.json();
                
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();

                if (response.ok && data.status === 'success') {
                    appendMessageElement(data.bot_response, 'bot-message', 'bot-' + Date.now());
                    activeChat.messages.push({ role: "assistant", content: data.bot_response });
                    localStorage.setItem('allChats', JSON.stringify(allChats));
                    
                    speak(data.bot_response);
                } else {
                    let errMsg = 'Dạ hệ thống của cháu đang bận, ông bà thử lại sau nhé ạ!';
                    appendMessageElement(errMsg, 'error-message', 'err-' + Date.now());
                    speak(errMsg);
                    activeChat.messages.pop();
                }
            } catch (error) {
                const loadingElement = document.getElementById(loadingId);
                if (loadingElement) loadingElement.remove();
                let errMsg = 'Dạ mạng bị lỗi rồi, ông bà kiểm tra lại kết nối nhé ạ!';
                appendMessageElement(errMsg, 'error-message', 'err-' + Date.now());
                speak(errMsg);
                activeChat.messages.pop();
            }
        }

        function appendMessageElement(text, className, fixedId, isHtml = false) {
            const messageDiv = document.createElement('div');
            messageDiv.id = fixedId;
            messageDiv.className = `message ${className}`;
            if (isHtml) {
                messageDiv.innerHTML = text;
            } else {
                messageDiv.innerText = text;
                const timeDiv = document.createElement('div');
                timeDiv.className = 'msg-time';
                const now = new Date();
                timeDiv.textContent = now.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
                messageDiv.appendChild(timeDiv);
            }

            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebarOverlay').classList.toggle('open');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('open');
        }

        function exportChatLog() {
            if (allChats.length === 0) {
                alert('Chưa có cuộc trò chuyện nào.');
                return;
            }

            const now = new Date();
            const dateStr = now.toLocaleString('vi-VN');
            let text = '===== TẤT CẢ CUỘC TRÒ CHUYỆN =====\n';
            text += 'Ngày xuất: ' + dateStr + '\n';
            text += '=============================================\n\n';

            allChats.forEach((chat, ci) => {
                text += '--- Cuộc trò chuyện ' + (ci + 1) + ': ' + chat.title + ' ---\n\n';
                if (chat.messages.length === 0) {
                    text += '(không có tin nhắn)\n\n';
                } else {
                    chat.messages.forEach((msg) => {
                        const label = msg.role === 'user' ? 'Người dùng' : 'Trợ lý';
                        text += '[' + label + ']: ' + msg.content + '\n\n';
                    });
                }
                text += '--- Kết thúc cuộc trò chuyện ' + (ci + 1) + ' ---\n\n';
            });

            text += '===== HẾT =====\n';

            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'tat_ca_cuoc_tro_chuyen.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
